<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET INSIGHT 3.0 | Dashboard</title>
    <style>
        :root {
            --bg-color: #03060a;
            --card-bg: rgba(13, 17, 23, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-up: #00ffcc;
            --accent-down: #ff0055;
            --accent-blue: #58a6ff;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --header-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 85, 0.03) 0%, transparent 40%);
            z-index: -1;
        }

        .dashboard-container {
            width: 100%;
            max-width: 2200px;
            margin: 0 auto;
            padding: 0.8rem 1.5rem;
        }

        header {
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 1rem;
            border-radius: 0 0 15px 15px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #8b949e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(88, 166, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            padding: 6px 0;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .ticker {
            display: inline-block;
            animation: ticker 120s linear infinite;
            padding-left: 100%;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 1.5rem;
            font-size: 0.8rem;
            color: var(--text-primary);
            border-right: 1px solid var(--border-color);
        }

        @keyframes ticker {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-100%, 0, 0);
            }
        }

        .main-grid {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .left-col {
            width: 260px;
            flex-shrink: 0;
        }

        .center-col {
            flex: 1.5;
            min-width: 400px;
        }

        .right-col {
            width: 320px;
            flex-shrink: 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
        }

        .pulse-dual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mini-card {
            background: var(--card-bg);
            padding: 4px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-height: 44px;
            justify-content: center;
        }

        .mini-card.up {
            border-left: 2px solid var(--accent-up);
        }

        .mini-card.down {
            border-left: 2px solid var(--accent-down);
        }

        .mini-symbol {
            font-size: 0.55rem;
            font-weight: 700;
            opacity: 0.8;
        }

        .mini-price {
            font-size: 0.75rem;
            font-weight: 800;
        }

        .mini-pct {
            font-size: 0.5rem;
            font-weight: 700;
        }

        .news-feed {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-card {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chart-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .chart-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            transition: 0.3s;
        }

        .chart-img:hover {
            transform: scale(1.01);
            filter: brightness(1.1);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            padding: 2.5rem;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .btn-refresh {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
        }

        .animate-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .up {
            color: var(--accent-up) !important;
        }

        .down {
            color: var(--accent-down) !important;
        }

        @media (max-width: 1000px) {
            .main-grid {
                flex-wrap: wrap;
            }

            .center-col,
            .right-col {
                flex: 1 1 100%;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="animate-up">
        <h1>Forcus Market <span style="color:var(--accent-blue)">β</span></h1>
        <div class="header-actions" style="display: flex; align-items: center; gap: 15px;">
            <div style="text-align: right; line-height: 1.2;">
                <div id="sync-status" style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 700;">
                    SYNCING DATA...</div>
                <div id="sync-footer"
                    style="font-size: 0.55rem; color: var(--accent-blue); opacity: 0.8; font-weight: 800; text-transform: uppercase;">
                    Init..</div>
            </div>
            <button class="btn-refresh" id="refresh-btn">REFRESH SYSTEM</button>
        </div>
    </header>

    <div id="news-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title" style="color:#fff; margin-bottom:1rem;"></h2>
            <div id="modal-body" style="color:var(--text-secondary); line-height:1.6; margin-bottom:1rem;"></div>
            <a id="modal-link" href="#" target="_blank"
                style="background:var(--accent-blue); color:#000; padding:10px 20px; border-radius:50px; text-decoration:none; font-weight:800;">本文を読む
                ↗</a>
            <button onclick="closeNewsModal()"
                style="background:none; border:none; color:#fff; position:absolute; top:20px; right:20px; cursor:pointer; font-size:1.5rem;">&times;</button>
        </div>
    </div>

    <div id="ai-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="ai-modal-title" style="color:#fff; margin-bottom:1rem;"></h2>
            <div id="ai-modal-body" style="color:var(--text-secondary); line-height:1.6;"></div>
            <button onclick="closeAIModal()"
                style="background:none; border:none; color:#fff; position:absolute; top:20px; right:20px; cursor:pointer; font-size:1.5rem;">&times;</button>
        </div>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="main-ticker"></div>
    </div>

    <div class="dashboard-container">
        <main class="main-grid">
            <aside class="left-col">
                <div class="card">
                    <h2 style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:1rem;">📡 MARKET PULSE</h2>
                    <div class="pulse-dual-grid">
                        <div id="us-indices"></div>
                        <div id="jp-indices"></div>
                    </div>
                </div>
            </aside>
            <section class="center-col">
                <div class="card">
                    <h2 style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:1rem;">🛡️ AI INTELLIGENCE
                    </h2>
                    <div id="ai-overview"></div>
                    <hr style="border:none; border-top:1px solid var(--border-color); margin:1.5rem 0;">
                    <div id="top-news-feed" class="news-feed"></div>
                </div>
            </section>
            <aside class="right-col">
                <div id="charts-main"></div>
            </aside>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
