<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET INSIGHT 3.0 | Dashboard</title>
    <style>
        :root {
            --bg-color: #03060a;
            --card-bg: rgba(13, 17, 23, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-up: #00ffcc;
            --accent-down: #ff0055;
            --accent-blue: #58a6ff;
            --glow-up: 0 0 15px rgba(0, 255, 204, 0.2);
            --glow-down: 0 0 15px rgba(255, 0, 85, 0.2);
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --header-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.4;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 85, 0.03) 0%, transparent 40%);
            z-index: -1;
        }

        .dashboard-container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 0.8rem 1.5rem;
        }

        header {
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 1rem;
            border-radius: 0 0 15px 15px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #8b949e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(88, 166, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            padding: 6px 0;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .ticker {
            display: inline-block;
            animation: ticker 120s linear infinite;
            padding-left: 100%;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 1.5rem;
            font-size: 0.8rem;
            color: var(--text-primary);
            border-right: 1px solid var(--border-color);
        }

        @keyframes ticker {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-100%, 0, 0);
            }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 240px 1.3fr 1fr;
            gap: 1rem;
            align-items: start;
        }

        .pulse-dual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .sub-col-label {
            font-size: 0.65rem;
            color: var(--accent-blue);
            text-align: center;
            margin-bottom: 6px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .indices-grid-compact {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .mini-card {
            background: var(--card-bg);
            padding: 4px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-height: 44px;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .mini-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(2px);
        }

        .mini-card.up {
            border-left: 2px solid var(--accent-up);
        }

        .mini-card.down {
            border-left: 2px solid var(--accent-down);
        }

        .mini-symbol {
            font-size: 0.55rem;
            color: var(--text-primary);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0px;
            opacity: 0.8;
        }

        .mini-price-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .mini-price {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .mini-pct {
            font-size: 0.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .center-col,
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .charts-grid-stacked {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chart-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .chart-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            filter: brightness(0.9);
            transition: 0.3s;
        }

        .chart-img:hover {
            transform: scale(1.01);
            filter: brightness(1.1);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0.8rem;
        }

        .news-feed {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .news-card {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
        }

        .news-card h4 {
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .news-card p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .btn-refresh {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-refresh:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @media (max-width: 600px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="animate-up">
        <div class="brand">
            <h1>Forcus Market <span style="color:var(--accent-blue)">β</span></h1>
        </div>
        <div class="header-actions">
            <span id="sync-status" style="margin-right: 20px; font-size: 0.8rem; color: var(--text-secondary);">SYNCING
                DATA...</span>
            <button class="btn-refresh" id="refresh-btn">REFRESH SYSTEM</button>
        </div>
    </header>

    <!-- Moving Ticker -->
    <div class="ticker-wrap animate-up" style="animation-delay: 0.1s;">
        <div class="ticker" id="main-ticker">
            <!-- Items injected by JS -->
        </div>
    </div>

    <div class="dashboard-container">
        <main class="main-grid">

            <!-- Left: Market Pulse (Dual Sidebar) -->
            <aside class="left-col">
                <div class="card animate-up" style="animation-delay: 0.2s;">
                    <div class="section-head">
                        <h2 class="section-title"><span>📡</span> MARKET PULSE</h2>
                    </div>
                    <div class="pulse-dual-grid">
                        <div class="pulse-sub-col">
                            <h3 class="sub-col-label">US</h3>
                            <div id="us-indices" class="indices-grid-compact">
                                <!-- Injected via app.js -->
                            </div>
                        </div>
                        <div class="pulse-sub-col">
                            <h3 class="sub-col-label">JP</h3>
                            <div id="jp-indices" class="indices-grid-compact">
                                <!-- Injected via app.js -->
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Center: AI Analysis & News -->
            <section class="center-col">
                <div class="card animate-up" style="animation-delay: 0.3s;">
                    <div class="section-head">
                        <h2 class="section-title"><span>🛡️</span> AI Market Intelligence</h2>
                    </div>
                    <div id="ai-overview" class="overview-content">
                        <!-- Injected via app.js -->
                        <div style="padding: 40px; text-align: center; color: var(--text-secondary);">ANALYZING MARKET
                            VIBRATIONS...</div>
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--border-color); margin: 2rem 0;">

                    <div class="section-head">
                        <h2 class="section-title"><span>📽️</span> News Wire</h2>
                    </div>
                    <div id="top-news-feed" class="news-feed">
                        <!-- Injected via app.js -->
                    </div>
                </div>
            </section>

            <!-- Right: Technical Charts -->
            <aside class="right-col">
                <div class="card animate-up" style="animation-delay: 0.4s;">
                    <div class="section-head">
                        <h2 class="section-title"><span>📊</span> Technical Visuals</h2>
                    </div>
                    <div id="charts-main" class="charts-grid-stacked">
                        <!-- Injected via app.js -->
                    </div>
                </div>
            </aside>

        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
