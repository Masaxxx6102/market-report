<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET INSIGHT 3.0 | Dashboard</title>
    <link rel="stylesheet" href="style.css?v=20260305_final">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <header class="animate-up">
        <div class="brand">
            <h1>Forcus Market <span style="color:var(--accent-blue)">β</span></h1>
        </div>
        <div class="header-actions">
            <span id="sync-status" style="margin-right: 20px; font-size: 0.8rem; color: var(--text-secondary);">SYNCING
                DATA...</span>
            <button class="btn-refresh" id="refresh-btn">REFRESH SYSTEM</button>
        </div>
    </header>

    <!-- Moving Ticker -->
    <div class="ticker-wrap animate-up" style="animation-delay: 0.1s;">
        <div class="ticker" id="main-ticker">
            <!-- Items injected by JS -->
        </div>
    </div>

    <div class="dashboard-container">
        <main class="main-grid">

            <!-- Left: Market Pulse (Dual Sidebar) -->
            <aside class="left-col">
                <div class="card animate-up" style="animation-delay: 0.2s;">
                    <div class="section-head">
                        <h2 class="section-title"><span>📡</span> MARKET PULSE</h2>
                    </div>
                    <div class="pulse-dual-grid">
                        <div class="pulse-sub-col">
                            <h3 class="sub-col-label">US</h3>
                            <div id="us-indices" class="indices-grid-compact">
                                <!-- Injected via app.js -->
                            </div>
                        </div>
                        <div class="pulse-sub-col">
                            <h3 class="sub-col-label">JP</h3>
                            <div id="jp-indices" class="indices-grid-compact">
                                <!-- Injected via app.js -->
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Center: AI Analysis & News -->
            <section class="center-col">
                <div class="card animate-up" style="animation-delay: 0.3s;">
                    <div class="section-head">
                        <h2 class="section-title"><span>🛡️</span> AI Market Intelligence</h2>
                    </div>
                    <div id="ai-overview" class="overview-content">
                        <!-- Injected via app.js -->
                        <div style="padding: 40px; text-align: center; color: var(--text-secondary);">ANALYZING MARKET
                            VIBRATIONS...</div>
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--border-color); margin: 2rem 0;">

                    <div class="section-head">
                        <h2 class="section-title"><span>📽️</span> News Wire</h2>
                    </div>
                    <div id="top-news-feed" class="news-feed">
                        <!-- Injected via app.js -->
                    </div>
                </div>
            </section>

            <!-- Right: Technical Charts -->
            <aside class="right-col">
                <div class="card animate-up" style="animation-delay: 0.4s;">
                    <div class="section-head">
                        <h2 class="section-title"><span>📊</span> Technical Visuals</h2>
                    </div>
                    <div id="charts-main" class="charts-grid-stacked">
                        <!-- Injected via app.js -->
                    </div>
                </div>
            </aside>

        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
