name: Daily Market Report Automation

on:
  schedule:
    # 18:37 JST is 09:37 UTC
    - cron: '37 9 * * *'
  workflow_dispatch: # 手動で [Run workflow] を押して実行できるようにする設定

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Japanese fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-ipafont-gothic fonts-ipafont-mincho

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create credentials file
      run: |
        echo "$GMAIL_TOKEN_JSON" > token.json
      env:
        GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}

    - name: Run Market Report
      run: python main.py
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
        GMAIL_RECIPIENTS: ${{ secrets.GMAIL_RECIPIENTS }}
