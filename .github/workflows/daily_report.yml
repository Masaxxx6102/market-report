name: Daily Market Report Automation

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/latest_report.json'
      - 'charts/**'
  schedule:
    # Hourly baseline (fallback)
    - cron: '0 * * * *'
    # Email Delivery (07:30 JST)
    - cron: '30 22 * * *'
    # 15-min updates during Active Market Hours (JST):
    # JP Market (TSE): 09:00-15:00 JST -> 00:00-06:00 UTC (Mon-Fri)
    # Note: 0-5 covers 09:00-14:45, and the hourly run at 06:00 UTC captures the 15:00 JST close.
    - cron: '*/15 0-5 * * 1-5'
    # US Market (NYSE/NASDAQ): 22:00-06:00 JST -> 13:00-21:00 UTC (Mon-Fri)
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create credentials file
      run: |
        echo "$GMAIL_TOKEN_JSON" > token.json
        echo "$GMAIL_CREDENTIALS_JSON" > credentials.json
      env:
        GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}

    - name: Run Market Report
      run: |
        if [ "${{ github.event_name }}" == "schedule" ] && [ "${{ github.event.schedule }}" == "30 22 * * *" ]; then
          echo "Scheduled daily report time (07:30 JST). Sending email..."
          python main.py
        elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "Manual trigger. Sending email..."
          python main.py
        else
          echo "Periodic update. Skipping email..."
          python main.py --no-email
        fi
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
        GMAIL_RECIPIENTS: ${{ secrets.GMAIL_RECIPIENTS }}

    - name: Commit and push changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add data/latest_report.json charts/*.png
        git commit -m "Auto-update market data for Web Dashboard" || echo "No changes to commit"
        git pull --rebase origin main
        git push origin main
