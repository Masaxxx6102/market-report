name: Daily Market Report Automation

on:
  schedule:
    # 07:30 JST is 22:30 UTC (previous day)
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create credentials file
      run: |
        echo "$GMAIL_TOKEN_JSON" > token.json
        echo "$GMAIL_CREDENTIALS_JSON" > credentials.json
      env:
        GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}

    - name: Run Market Report
      run: python main.py
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
        GMAIL_RECIPIENTS: ${{ secrets.GMAIL_RECIPIENTS }}

    - name: Commit and push changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add data/latest_report.json charts/*.png
        git commit -m "Auto-update market data for Web Dashboard [skip ci]" || echo "No changes to commit"
        git push
